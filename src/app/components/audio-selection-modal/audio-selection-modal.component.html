<!-- Backdrop -->

<!-- Backdrop -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
  <!-- Modal -->
  <div class="bg-white rounded-2xl w-full max-w-lg shadow-xl overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <div>
        <h2 class="text-base font-semibold text-gray-900">Upload audio</h2>
        <p class="text-sm text-gray-500 mt-0.5">Choose a source to get started</p>
      </div>
      <button
        onclick="closeModal()"
        class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg p-1.5 transition-colors"
      >
        <i class="ti ti-x text-xl"></i>
      </button>
    </div>

    <!-- Tabs -->
    <div ngTabs>
      <div
        ngTabList
        selectionMode="follow"
        [selectedTab]="selectedTab()"
        class="flex border-b border-gray-100"
      >
        <button
          ngTab
          value="recommended"
          onclick="showTab('recommended')"
          id="tab-recommended"
          class="tab-btn flex-1 flex items-center justify-center gap-1.5 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600 transition-colors"
        >
          <i class="ti ti-sparkles text-sm"></i>Recommended
        </button>
        <button
          ngTab
          value="url"
          onclick="showTab('url')"
          id="tab-url"
          class="tab-btn flex-1 flex items-center justify-center gap-1.5 py-3 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors"
        >
          <i class="ti ti-link text-sm"></i>URL
        </button>
        <button
          ngTab
          value="local"
          onclick="showTab('local')"
          id="tab-local"
          class="tab-btn flex-1 flex items-center justify-center gap-1.5 py-3 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-600 transition-colors"
        >
          <i class="ti ti-file-upload text-sm"></i>Local file
        </button>
      </div>

      <!-- Panel: Recommended -->
      <div>
        <div ngTabPanel [preserveContent]="true" value="recommended">
          <ng-template ngTabContent>
            <div id="panel-recommended" class="px-6 py-5">
              <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">
                Suggested samples
              </p>
              <div class="flex flex-col gap-2">
                <button
                  ngTabP
                  onclick="selectRec(1)"
                  id="rec-1"
                  class="rec-item flex items-center gap-3 p-3 rounded-xl border border-gray-100 bg-gray-50 hover:border-gray-300 transition-all text-left w-full"
                >
                  <div
                    class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center shrink-0"
                  >
                    <i class="ti ti-music text-blue-500 text-lg"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900">Sample interview.mp3</p>
                    <p class="text-xs text-gray-400 mt-0.5">4:32 · 8.2 MB · MP3</p>
                  </div>
                  <i id="rec-1-icon" class="ti ti-circle text-gray-300 text-lg shrink-0"></i>
                </button>

                <button
                  onclick="selectRec(2)"
                  id="rec-2"
                  class="rec-item flex items-center gap-3 p-3 rounded-xl border border-gray-100 bg-gray-50 hover:border-gray-300 transition-all text-left w-full"
                >
                  <div
                    class="w-10 h-10 rounded-lg bg-emerald-50 flex items-center justify-center shrink-0"
                  >
                    <i class="ti ti-microphone text-emerald-500 text-lg"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900">Podcast excerpt.wav</p>
                    <p class="text-xs text-gray-400 mt-0.5">2:15 · 23.1 MB · WAV</p>
                  </div>
                  <i id="rec-2-icon" class="ti ti-circle text-gray-300 text-lg shrink-0"></i>
                </button>

                <button
                  onclick="selectRec(3)"
                  id="rec-3"
                  class="rec-item flex items-center gap-3 p-3 rounded-xl border border-gray-100 bg-gray-50 hover:border-gray-300 transition-all text-left w-full"
                >
                  <div
                    class="w-10 h-10 rounded-lg bg-amber-50 flex items-center justify-center shrink-0"
                  >
                    <i class="ti ti-headphones text-amber-500 text-lg"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900">Meeting recording.m4a</p>
                    <p class="text-xs text-gray-400 mt-0.5">11:47 · 16.4 MB · M4A</p>
                  </div>
                  <i id="rec-3-icon" class="ti ti-circle text-gray-300 text-lg shrink-0"></i>
                </button>
              </div>
            </div>
            Panel 1</ng-template
          >
        </div>

        <!-- Panel: URL -->
        <div ngTabPanel [preserveContent]="true" value="url">
          <ng-template ngTabContent>
            <div id="panel-url" class="px-6 py-5 hidden">
              <label for="url-text-input" class="block text-sm font-medium text-gray-700 mb-1.5"
                >Audio file URL</label
              >
              <input
                id="url-text-input"
                type="url"
                placeholder="https://example.com/audio.mp3"
                class="w-full px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition mb-3"
              />
              <div
                class="flex items-start gap-2.5 p-3 bg-gray-50 rounded-xl border border-gray-100"
              >
                <i class="ti ti-info-circle text-gray-400 text-base mt-0.5 shrink-0"></i>
                <p class="text-xs text-gray-500">
                  Supported formats: MP3, WAV, M4A, OGG, FLAC. Maximum file size is 200 MB.
                </p>
              </div>
            </div>
          </ng-template>
        </div>

        <!-- Panel: Local File -->
        <div ngTabPanel [preserveContent]="true" value="local">
          <ng-template ngTabContent>
            <div id="panel-local" class="px-6 py-5 hidden">
              <div
                class="border-2 border-dashed border-gray-200 rounded-xl p-8 text-center cursor-pointer hover:border-gray-400 hover:bg-gray-50 transition-all group"
              >
                <i
                  class="ti ti-cloud-upload text-3xl text-gray-300 group-hover:text-gray-400 transition-colors block mb-2"
                ></i>
                <p class="text-sm font-medium text-gray-700 mb-1">Drop a file here</p>
                <p class="text-xs text-gray-400 mb-4">or click to browse your computer</p>
                <button
                  class="px-4 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-100 text-gray-700 transition-colors"
                >
                  Browse files
                </button>
              </div>
              <p class="text-xs text-gray-400 text-center mt-3">
                MP3, WAV, M4A, OGG, FLAC · up to 200 MB
              </p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-between px-6 py-4 border-t border-gray-100 relative">
      <!-- Settings gear + popover -->
      <div class="relative">
        <button
          onclick="toggleSettings()"
          id="settings-btn"
          class="flex items-center gap-1.5 px-3 py-2 text-sm text-gray-500 hover:text-gray-700 border border-gray-200 hover:bg-gray-50 rounded-xl transition-colors"
        >
          <i class="ti ti-settings text-base"></i>
          Settings
        </button>

        <!-- Popover -->
        <div
          id="settings-popover"
          [class]="
            (settingsOpen() ? '' : 'hidden ') +
            'absolute bottom-full left-0 mb-2 w-72 bg-white border border-gray-200 rounded-2xl shadow-lg z-10 overflow-hidden'
          "
        >
          <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
            <p class="text-sm font-medium text-gray-900">Settings</p>
            <button
              onclick="toggleSettings()"
              class="text-gray-400 hover:text-gray-600 transition-colors"
            >
              <i class="ti ti-x text-base"></i>
            </button>
          </div>

          <div class="px-4 py-4 flex flex-col gap-4">
            <!-- Language -->
            <div>
              <label class="block text-xs font-medium text-gray-700 mb-1.5">Language</label>
              <select
                class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition bg-white"
              >
                <option>Auto-detect</option>
                <option>English</option>
                <option>Spanish</option>
                <option>French</option>
                <option>German</option>
                <option>Japanese</option>
              </select>
            </div>

            <!-- Output format -->
            <div class="pt-3 border-t border-gray-100">
              <label class="block text-xs font-medium text-gray-700 mb-2">Output format</label>
              <div class="flex flex-col gap-1.5">
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="format" value="plain" checked class="accent-blue-600" />
                  <span class="text-sm text-gray-700">Plain text</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="format" value="timestamps" class="accent-blue-600" />
                  <span class="text-sm text-gray-700">With timestamps</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="format" value="srt" class="accent-blue-600" />
                  <span class="text-sm text-gray-700">SRT subtitles</span>
                </label>
              </div>
            </div>

            <!-- Speaker diarization -->
            <div class="pt-3 border-t border-gray-100 flex items-center justify-between gap-3">
              <div>
                <p class="text-xs font-medium text-gray-700">Speaker diarization</p>
                <p class="text-xs text-gray-400 mt-0.5">Label different speakers</p>
              </div>
              <button
                onclick="toggleSwitch()"
                id="toggle"
                class="relative w-9 h-5 rounded-full bg-gray-200 transition-colors duration-200 focus:outline-none shrink-0"
              >
                <span
                  id="thumb"
                  class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white shadow-sm transition-all duration-200"
                ></span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-2">
        <button
          onclick="closeModal()"
          class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition-colors"
        >
          Cancel
        </button>
        <button
          class="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors"
        >
          Upload
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Backdrop -->
<cq-modal [(open)]="open" modalClasses="max-w-lg max-h-[90vh] mt-auto mb-auto h-120">
  <span title>Upload audio</span>
  <span subtitle>Choose a source to get started</span>
  <div body>
    <!-- Tabs -->
    <div class="flex border-b border-default-soft">
      @for (tab of tabs; track tab.id) {
        <button
          (click)="setTab(tab.id)"
          [class]="
            'flex-1 flex items-center justify-center gap-1.5 py-3 text-sm font-medium border-b-2 transition-colors' +
            (activeTab() === tab.id
              ? ' border-brand text-brand'
              : ' border-transparent text-body-subtle cursor-pointer hover:text-body')
          "
        >
          <!-- Tab icons -->
          @if (tab.id === 'recommended') {
            <!-- Hero: sparkles -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z"
              />
            </svg>
          }
          @if (tab.id === 'url') {
            <!-- Hero: link -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244"
              />
            </svg>
          }
          @if (tab.id === 'local') {
            <!-- Hero: arrow-up-tray -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"
              />
            </svg>
          }
          {{ tab.label }}
        </button>
      }
    </div>

    <div class="px-6 py-5">
      <div class="relative">
        <div [class]="(activeTab() === 'recommended' ? '' : 'hidden ') + 'absolute inset-0'">
          <cq-recommended-files [(selectedFile)]="selectedFile"></cq-recommended-files>
        </div>

        <div [class]="(activeTab() === 'url' ? '' : 'hidden ') + 'absolute inset-0'">
          <cq-url-selector [(selectedFile)]="selectedFile"></cq-url-selector>
        </div>
        <div [class]="(activeTab() === 'local' ? '' : 'hidden ') + 'absolute inset-0'">
          <cq-file-selector [(selectedFile)]="selectedFile"></cq-file-selector>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div footer class="relative w-full">
    <!-- Settings popover -->
    <div
      class="absolute bottom-full left-0 mb-2 w-90 max-w-full bg-neutral-primary border border-default rounded-2xl shadow-lg z-10 overflow-hidden"
      [class.hidden]="!settingsOpen()"
      data-settings-popover
    >
      <!-- Popover header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-default">
        <p class="text-sm font-medium text-heading">Settings</p>
        <button
          (click)="closeSettings()"
          class="cursor-pointer text-body-subtle hover:text-body transition-colors"
          aria-label="Close settings"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="px-4 py-4 flex flex-col gap-4">
        <cq-settings [(settings)]="settings"></cq-settings>
      </div>
    </div>

    <div class="flex items-center justify-between w-full">
      <button
        data-settings-btn
        (click)="toggleSettings()"
        data-settings-btn
        [class]="
          'flex items-center gap-1.5 px-3 py-2 text-sm  border border-default rounded-xl transition-colors cursor-pointer ' +
          (settingsOpen()
            ? 'text-body-strong bg-neutral-secondary '
            : 'text-body-subtle hover:text-body-strong hover:bg-neutral-secondary ')
        "
        aria-label="Toggle settings"
      >
        <!-- Hero: cog-6-tooth -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
          />
          <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
        </svg>
        Settings
      </button>

      <!-- Actions -->
      <div class="flex items-center gap-2">
        <button
          (click)="close()"
          class="px-4 py-2 text-sm text-body hover:text-body-strong hover:bg-default-soft rounded-xl transition-colors cursor-pointer"
        >
          Cancel
        </button>
        <button
          (click)="upload()"
          [disabled]="!canUpload()"
          [class]="
            (canUpload()
              ? 'bg-brand text-neutral-primary hover:bg-brand-strong cursor-pointer'
              : 'bg-disabled-softer text-disabled cursor-not-allowed') +
            ' px-4 py-2 text-sm font-medium rounded-xl transition-colors'
          "
        >
          Upload
        </button>
      </div>
    </div>
  </div>
</cq-modal>

<!-- Empty state -->

<div [class.hidden]="!hasAudioFileData()" class="absolute inset-0 w-full h-full">
  <canvas #chartElement class="inset-0 w-full h-full m-5"></canvas>
</div>
<div
  [class.hidden]="hasAudioFileData()"
  class="absolute inset-0 flex flex-col items-center justify-center gap-3 pointer-events-none text-slate-300"
>
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none" class="opacity-60">
    <rect
      x="8"
      y="8"
      width="48"
      height="48"
      rx="8"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-dasharray="4 3"
    />
    <path
      d="M16 44 Q22 28 28 36 Q34 44 40 24 Q44 14 48 20"
      stroke="currentColor"
      stroke-width="1.5"
      fill="none"
      stroke-linecap="round"
    />
    <circle cx="32" cy="32" r="3" stroke="currentColor" stroke-width="1.2" />
  </svg>
  <p class="text-[11px] tracking-widest">Load an audio file to begin analysis</p>
</div>

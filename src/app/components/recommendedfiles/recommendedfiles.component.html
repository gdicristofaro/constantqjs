<div>
  <h5>Select from Recommended Files</h5>
  <div class="flex">
    @for (item of items; track item.filename) {
      <mat-chip class="link-chip" color="primary" selected (click)="onClick(item)">
        {{ item.filename }}{{ item.size ? (item.size | megabytes) : '' }}
      </mat-chip>
    }
  </div>
</div>

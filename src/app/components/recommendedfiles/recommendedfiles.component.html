<p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Recommended Files</p>
<div class="flex flex-col gap-2">
  @for (item of items; track item.filename) {
    <button
      role="radio"
      aria-checked="{{ selectedRecommendedUrl() === item.url }}"
      aria-selected="{{ selectedRecommendedUrl() === item.url }}"
      (click)="onClick(item)"
      [class]="
        (selectedRecommendedUrl() === item.url
          ? 'border-blue-500 bg-blue-50'
          : 'border-gray-100 bg-gray-50 hover:border-gray-300 cursor-pointer') +
        ' flex items-center gap-3 p-3 rounded-xl border transition-all text-left w-full'
      "
    >
      <!-- File info -->
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-gray-900">{{ item.filename }}</p>
        <p class="text-xs text-gray-400 mt-0.5">{{ item.size | megabytes }}</p>
      </div>

      <!-- Selection indicator -->
      @if (selectedRecommendedUrl() === item.url) {
        <!-- Hero: check-circle (filled) -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5 text-blue-600 shrink-0"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path
            fill-rule="evenodd"
            d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12Zm13.36-1.814a.75.75 0 1 0-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 0 0-1.06 1.06l2.25 2.25a.75.75 0 0 0 1.14-.094l3.75-5.25Z"
            clip-rule="evenodd"
          />
        </svg>
      } @else {
        <!-- Hero: circle (outline) -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5 text-gray-300 shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <circle cx="12" cy="12" r="9" />
        </svg>
      }
    </button>
  }
</div>

<!-- Progress bar row -->
<div class="flex items-center gap-3 mb-2">
  <span class="tabular text-xxs w-12">
    <span class="text-brand-medium font-medium">{{ curPosition() | playtime }}</span>
  </span>

  <div class="flex-1 h-1.5 rounded-full relative">
    <!-- Range input container with overlays -->
    <div class="range-slider-holder absolute">
      <input
        type="range"
        min="0"
        max="1"
        step="0.001"
        [value]="curPositionPerc()"
        (input)="onRangeChange($event)"
        aria-label="Seek audio position"
        class="range-slider w-full h-1.5 appearance-none rounded-full cursor-pointer relative z-10"
      />
    </div>

    <div class="z-1 rounded-4px pointer-events-none absolute inset-0 bg-default-soft w-full"></div>

    <!-- Processed region (sky blue gradient) -->
    <div
      [style.width]="loadedPerc() * 100 + '%'"
      class="z-2 rounded-4px duration-400 ease-linear transition-width pointer-events-none absolute inset-0 bg-gradient-to-r from-accent-softer to-accent"
    ></div>
    <!-- Played region (blue gradient) -->
    <div
      [style.width]="curPositionPerc() * 100 + '%'"
      class="z-3 rounded-4px pointer-events-none inset-0 absolute bg-brand"
    ></div>
    <!-- Processing frontier tick -->
    <div
      [style.left]="loadedPerc() * 100 + '%'"
      class="z-9 absolute pointer-events-none duration-400 ease-linear transition-left pointer-events-none abolute bar-tick bg-accent-medium shadow-[0_0_5px] shadow-accent-medium"
    ></div>
  </div>

  <span class="tabular text-xxs text-body w-12 text-right">{{ duration() ?? 0 | playtime }}</span>
</div>

<!-- Legend -->
<div
  class="max-h-500px:hidden flex items-center justify-center gap-6 text-xxs tracking-widest text-body uppercase mb-3"
>
  <div class="flex items-center gap-1.5">
    <div class="w-5 h-1 rounded-full bg-gradient-to-r from-accent-softer to-accent"></div>
    <span class="leading-none">Processed</span>
  </div>
  <div class="flex items-center gap-1.5">
    <div class="w-5 h-1 rounded-full bg-brand"></div>
    <span class="leading-none">Played</span>
  </div>
</div>

<!-- Transport controls -->
<div class="flex items-center justify-center gap-3">
  <!-- Rewind -->
  <button
    (click)="setCurPosition(0)"
    title="Rewind to start"
    class="flex items-center justify-center w-9 h-9 rounded-lg border border-default bg-neutral-primary text-body-subtler hover:bg-brand-soft hover:border-brand-light hover:text-brand transition-colors cursor-pointer"
  >
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h1.5v10H2V3zM4.5 8l8-5v10l-8-5z" />
    </svg>
  </button>

  <!-- Play / Pause -->
  <button
    (click)="togglePlay()"
    title="Play / Pause"
    class="flex items-center justify-center w-12 h-12 rounded-full bg-brand text-neutral-primary shadow-md dark:shadow-black hover:bg-brand-strong active:scale-95 transition-all cursor-pointer"
  >
    @if (isPlaying()) {
      <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
        <rect x="4" y="3" width="3.5" height="12" rx="1" />
        <rect x="10.5" y="3" width="3.5" height="12" rx="1" />
      </svg>
    } @else {
      <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
        <path d="M5 3.5l10 5.5-10 5.5V3.5z" />
      </svg>
    }
  </button>
</div>

<!-- Progress bar row -->
<div class="flex items-center gap-3">
  <span class="tabular text-[11px] w-12">
    <span id="time-current" class="text-accent font-medium">0:00.0</span>
  </span>

  <div
    id="transport-bar"
    class="flex-1 h-1.5 rounded-full bg-slate-200"
    onmousedown="onBarMouseDown(event)"
    ontouchstart="onBarTouchStart(event)"
  >
    <!-- Processed region (sky blue gradient) -->
    <div id="bar-processed" class="bg-gradient-to-r from-process-light to-process/30"></div>
    <!-- Played region (blue gradient) -->
    <div id="bar-played" class="bg-gradient-to-r from-accent-dark to-accent"></div>
    <!-- Processing frontier tick -->
    <div id="bar-tick" class="bg-process shadow-[0_0_5px_#0ea5e9]"></div>
    <!-- Playhead thumb -->
    <div id="bar-thumb" class="bg-accent shadow-md"></div>
  </div>

  <span id="time-total" class="tabular text-[11px] text-slate-400 w-12 text-right">0:00.0</span>
</div>

<!-- Legend -->
<div
  class="flex items-center justify-center gap-6 text-[9px] tracking-widest text-slate-400 uppercase"
>
  <div class="flex items-center gap-1.5">
    <div class="w-5 h-1 rounded-full bg-gradient-to-r from-process-light to-process/30"></div>
    <span>Processed</span>
  </div>
  <div class="flex items-center gap-1.5">
    <div class="w-0.5 h-3 rounded bg-process shadow-[0_0_4px_#0ea5e9]"></div>
    <span>Frontier</span>
  </div>
  <div class="flex items-center gap-1.5">
    <div class="w-5 h-1 rounded-full bg-gradient-to-r from-accent-dark to-accent"></div>
    <span>Playhead</span>
  </div>
</div>

<!-- Transport controls -->
<div class="flex items-center justify-center gap-3">
  <!-- Rewind -->
  <button
    id="btn-rewind"
    onclick="onRewind()"
    title="Rewind to start"
    class="flex items-center justify-center w-9 h-9 rounded-lg border border-slate-200 bg-white text-slate-400 hover:bg-accent-light hover:border-accent-mid hover:text-accent transition-colors cursor-pointer"
  >
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 3h1.5v10H2V3zM4.5 8l8-5v10l-8-5z" />
    </svg>
  </button>

  <!-- Play / Pause -->
  <button
    id="btn-play"
    onclick="onPlayPause()"
    title="Play / Pause"
    class="flex items-center justify-center w-12 h-12 rounded-full bg-accent text-white shadow-md hover:bg-accent-dark active:scale-95 transition-all cursor-pointer"
  >
    <svg id="icon-play" width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
      <path d="M5 3.5l10 5.5-10 5.5V3.5z" />
    </svg>
    <svg
      id="icon-pause"
      width="18"
      height="18"
      viewBox="0 0 18 18"
      fill="currentColor"
      class="hidden"
    >
      <rect x="4" y="3" width="3.5" height="12" rx="1" />
      <rect x="10.5" y="3" width="3.5" height="12" rx="1" />
    </svg>
  </button>
</div>

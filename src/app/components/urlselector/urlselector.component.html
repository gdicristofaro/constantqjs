<div class="m-0 p-0">
  <form [formGroup]="urlForm" class="m-0 p-0">
    <label
      for="urlSelectorFileInput"
      class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-0"
    >
      Audio file URL
    </label>
    <input
      name="urlSelectorFileInput"
      formControlName="urlSelectorFileInput"
      type="text"
      id="urlSelectorFileInput"
      placeholder="https://example.com/audio.mp3"
      class="w-full px-3.5 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition mb-3"
    />
  </form>
</div>

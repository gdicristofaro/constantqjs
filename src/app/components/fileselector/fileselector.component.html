<!-- taken from https://flowbite.com/docs/forms/file-input/ -->
<div
  [class]="
    (isDragging()
      ? 'border-brand-400 bg-brand-50'
      : 'border-secondary-200 hover:border-secondary-400 hover:bg-secondary-50') +
    ' border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all'
  "
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
  (click)="fileInput.click()"
  (keypress)="fileInput.click()"
  tabindex="0"
>
  <!-- Hero: cloud-arrow-up -->
  <svg
    xmlns="http://www.w3.org/2000/svg"
    class="w-10 h-10 mx-auto mb-2 transition-colors"
    [class.text-brand-400]="isDragging()"
    [class.text-secondary-300]="!isDragging()"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path
      d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.338-2.32 5.75 5.75 0 0 1 .053 11.095H6.75Z"
    />
  </svg>

  @let selectedFileItem = selectedFile();
  @if (selectedFileItem && selectedFileItem.type === 'file' && selectedFileItem.audioFile) {
    <p class="text-sm font-medium text-secondary-700 mb-0.5">
      {{ selectedFileItem.audioFile.filename }}
    </p>
    <p class="text-xs text-secondary-400">
      {{ selectedFileItem.audioFile.size ?? 0 | megabytes }} MB
    </p>
  } @else {
    <p class="text-sm font-medium text-secondary-700 mb-1">Drop a file here</p>
    <p class="text-xs text-secondary-400 mb-4">or click to browse your computer</p>
    <button
      class="px-4 py-2 text-sm border border-secondary-200 rounded-lg hover:bg-secondary-100 text-secondary-700 transition-colors"
      (click)="$event.stopPropagation(); fileInput.click()"
    >
      Browse files
    </button>
  }
</div>
<input #fileInput type="file" accept="audio/*" class="hidden" (change)="onFileSelected($event)" />

<div class="rounded-xl bg-gray-50 p-4 space-y-4 border border-gray-100">
  <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest">Settings</label>
  <form [formGroup]="settingsForm">
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="settingsMinPitch" class="block text-xs font-medium text-gray-600 mb-1"
          >Min Pitch</label
        >

        <select
          id="settingsMinPitch"
          name="settingsMinPitch"
          formControlName="settingsMinPitch"
          class="w-full rounded-md border border-gray-300 bg-white px-2 py-1.5 text-sm outline-none focus:border-blue-500"
        >
          @for (pitch of minPitches(); track pitch.frequency) {
            <option value="{{ pitch }}">
              {{ getName(pitch) }}
            </option>
          }
        </select>
      </div>
      <div>
        <label for="settingsMaxPitch" class="block text-xs font-medium text-gray-600 mb-1"
          >Max Pitch</label
        >
        <select
          class="w-full rounded-md border border-gray-300 bg-white px-2 py-1.5 text-sm outline-none focus:border-blue-500"
          id="settingsMaxPitch"
          name="settingsMaxPitch"
          formControlName="settingsMaxPitch"
        >
          @for (pitch of maxPitches(); track pitch.frequency) {
            <option [value]="pitch">
              {{ getName(pitch) }}
            </option>
          }
        </select>
      </div>
    </div>

    <div>
      <label for="settingsFps" class="block text-xs font-medium text-gray-600 mb-1"
        >Samples per second (1-32)</label
      >
      <input
        name="settingsFps"
        formControlName="settingsFps"
        id="settingsFps"
        type="number"
        min="1"
        max="32"
        value="16"
        class="w-full rounded-md border border-gray-300 bg-white px-3 py-1.5 text-sm outline-none focus:border-blue-500"
      />
    </div>
  </form>
</div>

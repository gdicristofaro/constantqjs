<cq-audio-selection-modal [(open)]="modalOpen" (uploadRequest)="handleUploadRequest($event)" />
<cq-audio-loading-modal />

<div class="h-dvh w-full m-0 p-0 flex flex-col bg-background font-mono text-fg-800">
  <header
    class="flex-shrink-0 flex items-center justify-between px-5 py-3 bg-background border-b border-fg-200 shadow-sm"
  >
    <div class="flex items-center gap-3">
      <!-- <svg
        width="28"
        height="28"
        viewBox="0 0 28 28"
        fill="none"
        class="flex-shrink-0 hidden md:block"
      >
        <rect width="28" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe" />
        <path
          d="M6 20 Q10 8 14 14 Q18 20 22 8"
          stroke="#2563eb"
          stroke-width="1.8"
          fill="none"
          stroke-linecap="round"
        />
        <circle cx="14" cy="14" r="1.5" fill="#0ea5e9" />
      </svg> -->
      <div>
        <h1 class="font-display font-bold text-sm tracking-widest uppercase text-fg-800">
          ConstantQ<span class="text-brand-700">.js</span>
        </h1>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <cq-loading-indicator />

      <button
        (click)="modalOpen.set(true)"
        class="inline-flex items-center gap-1.5 px-3.5 h-9 rounded-lg border border-brand-400 bg-brand-100 text-brand-700 text-[11px] tracking-wider hover:bg-brand-200 hover:border-brand-500 transition-colors cursor-pointer"
      >
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path
            d="M7 1v8M4 6l3 3 3-3M2 10v2a1 1 0 001 1h8a1 1 0 001-1v-2"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        LOAD FILE
      </button>
    </div>
  </header>

  <cq-file-info-bar />

  <main class="flex-1 relative min-h-0 overflow-hidden bg-background">
    <div
      [class.hidden]="hasAudioFileData()"
      class="absolute inset-0 flex flex-col items-center justify-center"
    >
      <div
        class="flex flex-col items-center justify-center gap-3 p-6 text-fg-300 cursor-pointer"
        (click)="modalOpen.set(true)"
        (keypress.enter)="modalOpen.set(true)"
        (keypress.space)="modalOpen.set(true)"
        tabindex="1"
      >
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" class="opacity-60">
          <rect
            x="8"
            y="8"
            width="48"
            height="48"
            rx="8"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-dasharray="4 3"
          />
          <path
            d="M16 44 Q22 28 28 36 Q34 44 40 24 Q44 14 48 20"
            stroke="currentColor"
            stroke-width="1.5"
            fill="none"
            stroke-linecap="round"
          />
          <circle cx="32" cy="32" r="3" stroke="currentColor" stroke-width="1.2" />
        </svg>
        <p class="text-[11px] tracking-widest">Load an audio file to begin analysis</p>
      </div>
    </div>

    <cq-audio-visualizer [class.hidden]="!hasAudioFileData()" />
  </main>

  <div
    class="flex-shrink-0 h-px bg-gradient-to-r from-transparent via-accent-mid to-transparent"
  ></div>

  <footer class="flex-shrink-0 flex flex-col gap-3 px-5 py-4 bg-background border-t border-fg-200">
    @if (showControls()) {
      <cq-audio-player />
    }
  </footer>
</div>

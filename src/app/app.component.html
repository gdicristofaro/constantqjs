<cq-audio-selection-modal [(open)]="modalOpen" (uploadRequest)="handleUploadRequest($event)" />
<cq-audio-loading-modal />

<div class="h-dvh w-full m-0 p-0 flex flex-col bg-background font-mono text-heading">
  <header
    class="flex-shrink-0 flex items-center justify-between px-5 py-3 bg-background border-b border-default shadow-sm"
  >
    <div class="flex items-center gap-3">
      <div>
        <h1 class="font-display font-bold text-sm tracking-widest uppercase text-heading">
          ConstantQ<span class="text-brand">.js</span>
        </h1>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <cq-loading-indicator />

      <button
        (click)="modalOpen.set(true)"
        class="inline-flex items-center gap-1.5 px-3.5 h-9 rounded-lg border border-brand-light bg-brand-soft text-brand text-[11px] tracking-wider hover:bg-brand-subtle hover:border-brand-strong hover:text-brand-strong transition-colors cursor-pointer"
      >
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path
            d="M7 1v8M4 6l3 3 3-3M2 10v2a1 1 0 001 1h8a1 1 0 001-1v-2"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        LOAD FILE
      </button>
    </div>
  </header>

  <cq-file-info-bar />

  <main class="flex-1 relative min-h-0 overflow-hidden bg-background">
    <div
      [class.hidden]="hasAudioFileData()"
      class="absolute inset-0 flex flex-col items-center justify-center"
    >
      <div
        class="flex flex-col items-center justify-center gap-3 p-6 text-body-subtle cursor-pointer"
        (click)="modalOpen.set(true)"
        (keypress.enter)="modalOpen.set(true)"
        (keypress.space)="modalOpen.set(true)"
        tabindex="1"
      >
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" class="opacity-60">
          <rect
            x="8"
            y="8"
            width="48"
            height="48"
            rx="8"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-dasharray="4 3"
          />
          <path
            d="M16 44 Q22 28 28 36 Q34 44 40 24 Q44 14 48 20"
            stroke="currentColor"
            stroke-width="1.5"
            fill="none"
            stroke-linecap="round"
          />
          <circle cx="32" cy="32" r="3" stroke="currentColor" stroke-width="1.2" />
        </svg>
        <p class="text-[11px] tracking-widest">Load an audio file to begin analysis</p>
      </div>
    </div>

    <cq-audio-visualizer [class.hidden]="!hasAudioFileData()" />
  </main>

  <footer class="flex-shrink-0 flex flex-col gap-3 px-5 py-4 bg-background border-t border-default">
    @if (showControls()) {
      <cq-audio-player />
    }
  </footer>
</div>

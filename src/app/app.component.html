<!-- the actual bootstrap modal -->
<ng-template #modal let-modal>
  <h4 mat-dialog-title>Loading...</h4>
  <mat-dialog-content>
    <div>{{ loadingMessage() }}</div>
    @if (loadingPercentage()) {
      <h4>{{ loadingPercentage() | percent }}</h4>
    }
  </mat-dialog-content>
</ng-template>

<cq-audio-selection-modal [(open)]="modalOpen" (uploadRequest)="handleUploadRequest($event)" />
<button
  (click)="modalOpen.set(true)"
  class="rounded-lg bg-blue-600 px-6 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700 transition"
>
  Open
</button>

<div class="container-fluid">
  <div class="text-center">
    <h2>Constant Q Transform</h2>
  </div>

  <div class="row text-center">
    <!-- if controls should be shown (i.e. an audio file has been selected), 
        visualizes the music -->
    @if (showControls()) {
      @let audioFileData = audioLoadSvc.audioFileData();
      @let constantQData = constantQSvc.constantQData();

      @if (audioFileData && constantQData) {
        <div class="col-md-12 pl-5 pr-5">
          <cq-audio-visualizer [audioFileData]="audioFileData" [constantQData]="constantQData" />
        </div>
      }

      <!-- if controls should be shown (i.e. an audio file has been selected), 
        provides playback for the audio file -->
      <div class="col-md-12 pl-5 pr-5">
        <cq-audio-player />
      </div>
    }
  </div>
  <div style="margin-bottom: 50px"></div>
</div>

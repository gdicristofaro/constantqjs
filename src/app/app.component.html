<cq-audio-selection-modal #audioSelectionModal (uploadRequest)="handleUploadRequest($event)" />
<cq-audio-loading-modal />

<div class="h-dvh w-full m-0 p-0 flex flex-col bg-background text-heading">
  <header
    class="flex-shrink-0 flex items-center justify-between px-5 py-3 bg-background border-b border-default dark:shadow-black shadow-sm"
  >
    <div class="flex items-center gap-3">
      <div>
        <h1 class="font-mono font-display font-bold text-sm tracking-widest uppercase text-heading">
          ConstantQ<span class="text-brand-medium">.js</span>
        </h1>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <cq-loading-indicator />

      <button
        (click)="openAudioSelectionModal()"
        class="inline-flex items-center gap-1.5 bg-brand text-neutral-primary hover:bg-brand-strong cursor-pointer px-4 py-2 text-xs font-medium rounded-xl transition-colors"
      >
        <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
          <path
            d="M7 1v8M4 6l3 3 3-3M2 10v2a1 1 0 001 1h8a1 1 0 001-1v-2"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Load File
      </button>
    </div>
  </header>

  <cq-file-info-bar />

  <main class="flex-1 relative min-h-0 overflow-hidden bg-background">
    <div
      [class.hidden]="hasAudioFileData()"
      class="absolute inset-0 flex flex-col items-center justify-center"
    >
      <button
        class="flex flex-col items-center justify-center gap-3 p-6 text-body-subtle cursor-pointer"
        (click)="openAudioSelectionModal()"
        tabindex="0"
      >
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" class="opacity-60">
          <rect
            x="8"
            y="8"
            width="48"
            height="48"
            rx="8"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-dasharray="4 3"
          />
          <path
            d="M16 44 Q22 28 28 36 Q34 44 40 24 Q44 14 48 20"
            stroke="currentColor"
            stroke-width="1.5"
            fill="none"
            stroke-linecap="round"
          />
          <circle cx="32" cy="32" r="3" stroke="currentColor" stroke-width="1.2" />
        </svg>
        <p class="text-xxs tracking-widest">Load an audio file to analyze for pitches</p>
      </button>
    </div>

    <cq-audio-visualizer [show]="hasAudioFileData()" />
  </main>

  <footer class="flex-shrink-0 flex flex-col gap-3 px-5 py-4 bg-background border-t border-default">
    @if (showControls()) {
      <cq-audio-player />
    }
  </footer>
</div>
